name: CI

# Typecheck + the network-free Jest suite (LLM provider is mocked). Runs on every
# push to master and every PR, so the CI badge reflects real build health.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
